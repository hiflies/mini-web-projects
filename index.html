<!-- CV Popup -->
<div id="overlay"></div>
<div id="cvPopup">
    <div id="cvSummary" style="padding: 20px;">
    <h2>Your Name</h2>
    <p><strong>Position:</strong> Frontend Developer</p>
    <p><strong>Email:</strong> example@gmail.com</p>
    <p><strong>Summary:</strong> I have experience in web development and UI/UX.</p>
    </div>
    <button id="closeBtn">Close</button>
<!--    <button id="downloadBtn">PDF İndir</button>-->
    <button id="fullScreenBtn">Full Screen</button>
    <iframe src="cv.html"></iframe>
</div>

<script>
    const card1 = document.getElementById('card1');
    const cvPopup = document.getElementById('cvPopup');
    const overlay = document.getElementById('overlay');
    const closeBtn = document.getElementById('closeBtn');
    const fullScreenBtn = document.getElementById('fullScreenBtn');
    

    card1.addEventListener('click', () => {
        cvPopup.style.display = 'block';
        overlay.style.display = 'block';
    });

    closeBtn.addEventListener('click', () => {
        cvPopup.style.display = 'none';
        overlay.style.display = 'none';
    });

    overlay.addEventListener('click', () => {
        cvPopup.style.display = 'none';
        overlay.style.display = 'none';
    });

    fullScreenBtn.addEventListener('click', () => {
        // Yeni sekmede cv.html aç
        window.open('cv.html', '_blank');
    });
